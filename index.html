<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puxa Conversa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg1: #FF8C3A;
    --bg2: #F25E0C;
    --bg3: #D44A05;
    --ink: #2A1505;
    --cream: #FFF6EC;
    --shadow: rgba(120, 50, 0, 0.32);
    --card-bg: #FCE3D2;
    --card-text: #6B3415;
    --card-accent: #D9783F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    background:
      radial-gradient(circle at 18% 12%, #FFB36B 0%, transparent 42%),
      radial-gradient(circle at 88% 88%, #FF7A2E 0%, transparent 48%),
      linear-gradient(155deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
    transition: background 0.6s ease;
  }

  .stage {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(14px, 3vh, 30px) 18px;
  }

  header { text-align: center; color: var(--cream); flex-shrink: 0; }
  header .eyebrow {
    font-size: 0.66rem; letter-spacing: 0.4em; text-transform: uppercase;
    font-weight: 600; opacity: 0.85; margin-bottom: 4px;
  }
  header h1 {
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(1.9rem, 6.5vw, 3rem); line-height: 0.95;
    text-shadow: 0 3px 0 var(--bg3), 0 6px 16px var(--shadow);
  }

  .selector {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 14px 0 6px; flex-shrink: 0; max-width: 560px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 999px; cursor: pointer;
    font-size: 0.82rem; font-weight: 600; border: 2px solid transparent;
    background: rgba(255,255,255,0.22); color: var(--cream);
    transition: all 0.18s; backdrop-filter: blur(4px);
    user-select: none;
  }
  .pill .sym { font-size: 1rem; }
  .pill .cnt { font-size: 0.7rem; opacity: 0.75; font-weight: 500; }
  .pill[aria-pressed="true"] {
    background: var(--cream); color: var(--ink);
    box-shadow: 0 5px 14px var(--shadow);
  }
  .pill:focus-visible { outline: 3px solid var(--cream); outline-offset: 2px; }

  .deck-area {
    position: relative; width: min(370px, 84vw);
    flex: 1; display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }
  .deck-stack { position: absolute; inset: 0; pointer-events: none; }
  .deck-stack span {
    position: absolute; inset: 0; border-radius: 26px;
    background: var(--card-accent);
    box-shadow: 0 10px 28px var(--shadow);
    transition: background 0.4s;
  }
  .deck-stack span:nth-child(1) { transform: translate(9px,11px) rotate(3deg); opacity:0.35; }
  .deck-stack span:nth-child(2) { transform: translate(4px,5px) rotate(-2deg); opacity:0.55; }
  .deck-stack.hidden span { display:none; }

  .card {
    position: relative; width: 100%; aspect-ratio: 3/4.2;
    max-height: 100%;
    border-radius: 26px; background: var(--card-bg); color: var(--card-text);
    box-shadow: 0 18px 48px var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.5);
    padding: 28px 24px; display: flex; flex-direction: column;
    cursor: pointer; user-select: none;
    transition: transform 0.45s cubic-bezier(.2,.8,.2,1), opacity 0.45s, background 0.4s, color 0.4s;
  }
  .card::before {
    content:""; position:absolute; inset:12px; border-radius:16px;
    border: 1.5px dashed currentColor; opacity: 0.28; pointer-events:none;
  }
  .card.dealing { animation: deal 0.5s cubic-bezier(.2,.8,.2,1); }
  @keyframes deal {
    0% { transform: translateY(38px) rotate(-5deg) scale(.92); opacity:0; }
    100% { transform: translateY(0) rotate(0) scale(1); opacity:1; }
  }
  .card.discarding { transform: translateX(125%) rotate(16deg); opacity:0; }

  .card .top-row {
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Fraunces',serif;
  }
  .card .sym-badge { font-size: 1.4rem; }
  .card .tag {
    font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
    font-weight:700; padding:5px 11px; border-radius:999px;
    background: var(--card-accent); color:#fff;
  }
  .card.is-dare .tag { background: var(--ink); }
  .card .theme-label {
    font-size:0.64rem; letter-spacing:0.2em; text-transform:uppercase;
    font-weight:600; opacity:0.6; margin-top:10px; text-align:center;
  }
  .card .question {
    flex:1; display:flex; align-items:center; justify-content:center;
    text-align:center; font-family:'Fraunces',serif; font-weight:600;
    font-size:clamp(1.2rem,4.8vw,1.62rem); line-height:1.3; padding:10px 4px;
  }
  .card.is-dare .question::before {
    content:"⚡ DESAFIO ⚡"; position:absolute; top:54px; left:0; right:0;
    font-family:'Inter',sans-serif; font-size:0.62rem; letter-spacing:0.3em;
    font-weight:700; opacity:0.55;
  }
  .card .foot {
    text-align:center; font-size:0.62rem; letter-spacing:0.26em;
    text-transform:uppercase; font-weight:600; opacity:0.55;
  }
  .card.empty { cursor:default; align-items:center; justify-content:center; text-align:center; }
  .card.empty .question { font-size:clamp(1rem,4vw,1.3rem); }
  .card.loading .question { font-size: 1rem; opacity: 0.7; }

  .controls { display:flex; gap:10px; align-items:center; margin-top:14px; flex-shrink:0; }
  button {
    font-family:'Inter',sans-serif; font-weight:600; border:none; cursor:pointer;
    border-radius:999px; transition:transform .15s, background .15s;
  }
  button:active { transform:scale(.95); }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-draw {
    background:var(--ink); color:var(--cream); font-size:1rem;
    padding:15px 32px; box-shadow:0 8px 18px var(--shadow);
  }
  .btn-draw:hover:not(:disabled){ background:#3d2008; }
  .btn-reset {
    background:rgba(255,255,255,0.25); color:var(--cream);
    font-size:0.82rem; padding:13px 18px; backdrop-filter:blur(4px);
  }
  .btn-reset:hover{ background:rgba(255,255,255,0.4); }
  button:focus-visible{ outline:3px solid var(--cream); outline-offset:3px; }

  .counter { color:var(--cream); font-size:0.74rem; margin-top:11px; opacity:0.9; flex-shrink:0; text-align:center; }
  .counter b{ font-weight:700; }

  @media (prefers-reduced-motion: reduce){
    .card,.card.dealing{ transition:none; animation:none; }
    body{ transition:none; }
  }
</style>
</head>
<body>
  <div class="stage">
    <header>
      <div class="eyebrow">Baralho de perguntas</div>
      <h1>Puxa Conversa</h1>
    </header>

    <div class="selector" id="selector" role="group" aria-label="Escolha os baralhos"></div>

    <div class="deck-area">
      <div class="deck-stack" id="deckStack"><span></span><span></span></div>
      <div class="card loading" id="card">
        <div class="top-row">
          <span class="sym-badge" id="symBadge">🃏</span>
          <span class="tag" id="cardTag">início</span>
        </div>
        <div class="question" id="question">Carregando baralhos…</div>
        <div class="theme-label" id="themeLabel"></div>
        <div class="foot">toque para virar</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-draw" id="drawBtn" disabled>Puxar carta</button>
      <button class="btn-reset" id="resetBtn">Reembaralhar</button>
    </div>
    <div class="counter"><b id="remaining">0</b> cartas no monte · <span id="drawn">0</span> tiradas</div>
  </div>

<script>
/* ============================================================
   PUXA CONVERSA — engine (versão flat / arquivos na raiz)

   Todos os baralhos (.json) ficam na MESMA pasta do index.html.
   Para adicionar um baralho: jogue o .json na pasta e adicione o
   nome do arquivo na lista KNOWN_PACKS abaixo. Só isso.

   Descoberta, em ordem:
     1) GitHub Pages — lista a raiz do repo via API do GitHub e pega
        qualquer .json que tenha o formato de baralho (automático).
     2) Lista KNOWN_PACKS — tenta carregar cada nome direto (funciona
        em qualquer servidor http, inclusive GitHub Pages, e é o que
        garante o carregamento se a API falhar ou tiver limite).
   ============================================================ */

// >>> Para adicionar baralhos novos sem depender da API, liste os arquivos aqui:
const KNOWN_PACKS = [
  "raizes.json",
  "mundo-interior.json",
  "aguas-profundas.json"
];

const FALLBACK_EMBEDDED = [{
  id:"exemplo", theme:"Exemplo", explores:"demonstração offline",
  color:"#FCE3D2", textColor:"#6B3415", accent:"#D9783F", symbol:"🌱",
  cards:[
    {type:"question",text:"Nenhum baralho .json foi encontrado nesta pasta. Publique no GitHub Pages ou rode um servidor local."},
    {type:"question",text:"Dica: rode 'python3 -m http.server' na pasta dos arquivos e abra http://localhost:8000"}
  ]
}];

let PACKS = [];
let active = new Set();
let deck = [];
let drawnCount = 0;

const $ = id => document.getElementById(id);
const card = $('card'), questionEl = $('question'), tagEl = $('cardTag'),
      symBadge = $('symBadge'), themeLabel = $('themeLabel'),
      remainingEl = $('remaining'), drawnEl = $('drawn'),
      drawBtn = $('drawBtn'), resetBtn = $('resetBtn'),
      selector = $('selector'), deckStack = $('deckStack');

function isPack(p){ return p && typeof p==='object' && p.id && Array.isArray(p.cards); }

async function tryFetchJson(url){
  try { const r = await fetch(url, {cache:"no-store"}); if(!r.ok) return null; return await r.json(); }
  catch(e){ return null; }
}

// 1) Descoberta automática na RAIZ do repositório (GitHub Pages)
async function discoverViaGitHubApi(){
  const host = location.hostname;
  if(!host.endsWith("github.io")) return null;
  const user = host.split(".")[0];
  const parts = location.pathname.split("/").filter(Boolean);
  const repo = parts.length ? parts[0] : `${user}.github.io`;
  const api = `https://api.github.com/repos/${user}/${repo}/contents/`; // raiz
  const list = await tryFetchJson(api);
  if(!Array.isArray(list)) return null;
  const files = list
    .filter(f => f.type==="file" && f.name.endsWith(".json"))
    .map(f => f.download_url || f.name);
  const loaded = [];
  for(const u of files){ const p = await tryFetchJson(u); if(isPack(p)) loaded.push(p); }
  return loaded.length ? loaded : null;
}

// 2) Carregar pela lista conhecida (mesmo diretório do index.html)
async function discoverViaKnownList(){
  const loaded = [];
  for(const name of KNOWN_PACKS){ const p = await tryFetchJson(name); if(isPack(p)) loaded.push(p); }
  return loaded.length ? loaded : null;
}

async function loadPacks(){
  let packs = await discoverViaGitHubApi();
  if(!packs) packs = await discoverViaKnownList();
  if(!packs) packs = FALLBACK_EMBEDDED;
  const seen = new Set();
  PACKS = packs.filter(p => p.id && !seen.has(p.id) && seen.add(p.id));
  PACKS.sort((a,b)=> (a.theme||"").localeCompare(b.theme||""));
}

function renderSelector(){
  selector.innerHTML = "";
  PACKS.forEach(p => {
    const b = document.createElement("button");
    b.className = "pill";
    b.setAttribute("aria-pressed", active.has(p.id) ? "true":"false");
    b.innerHTML = `<span class="sym">${p.symbol||"🃏"}</span> ${p.theme}
                   <span class="cnt">${p.cards.length}</span>`;
    b.onclick = () => {
      if(active.has(p.id)) active.delete(p.id); else active.add(p.id);
      if(active.size===0) active.add(p.id);
      syncPills(); buildDeck(true);
    };
    selector.appendChild(b);
  });
}
function syncPills(){
  [...selector.children].forEach((b,i)=>{
    b.setAttribute("aria-pressed", active.has(PACKS[i].id)?"true":"false");
  });
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildDeck(resetFace){
  const pool = [];
  PACKS.forEach(p => { if(active.has(p.id)) p.cards.forEach(c => pool.push({...c, _pack:p})); });
  deck = shuffle(pool);
  drawnCount = 0;
  updateCounter();
  drawBtn.disabled = deck.length===0;
  drawBtn.textContent = "Puxar carta";
  if(resetFace) showStart();
}

function applyPackTheme(p){
  document.documentElement.style.setProperty('--card-bg', p.color||"#FCE3D2");
  document.documentElement.style.setProperty('--card-text', p.textColor||"#6B3415");
  document.documentElement.style.setProperty('--card-accent', p.accent||"#D9783F");
}

function showStart(){
  card.className = "card";
  deckStack.classList.toggle("hidden", deck.length===0);
  symBadge.textContent = "🃏";
  tagEl.textContent = "início";
  themeLabel.textContent = active.size>1 ? `${active.size} baralhos misturados` : "";
  questionEl.textContent = deck.length ? "Toque em “Puxar carta” para começar." : "Selecione ao menos um baralho.";
}

function updateCounter(){ remainingEl.textContent = deck.length; drawnEl.textContent = drawnCount; }

function drawCard(){
  if(deck.length===0){ showEmpty(); return; }
  const c = deck.pop();
  drawnCount++;
  applyPackTheme(c._pack);
  card.className = "card" + (c.type==="dare" ? " is-dare":"");
  deckStack.classList.toggle("hidden", deck.length===0);
  symBadge.textContent = c._pack.symbol || "🃏";
  tagEl.textContent = c.type==="dare" ? "desafio" : c._pack.theme;
  themeLabel.textContent = c.type==="dare" ? c._pack.theme : (c._pack.explores||"");
  questionEl.textContent = c.text;
  void card.offsetWidth; card.classList.add("dealing");
  updateCounter();
  if(deck.length===0){ drawBtn.textContent = "Acabou o monte"; drawBtn.disabled = true; }
}

function showEmpty(){
  card.className = "card empty";
  deckStack.classList.add("hidden");
  symBadge.textContent = "✨";
  tagEl.textContent = "fim";
  themeLabel.textContent = "";
  questionEl.textContent = `As ${drawnCount} cartas já foram. Reembaralhe para recomeçar.`;
}

card.addEventListener("click", ()=>{
  if(card.classList.contains("empty")||card.classList.contains("loading")) return;
  const isStart = tagEl.textContent==="início";
  if(isStart){ drawCard(); return; }
  card.classList.add("discarding");
  const after = ()=>{ card.classList.remove("discarding"); drawCard(); };
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) after();
  else setTimeout(after, 440);
});

drawBtn.addEventListener("click", drawCard);
resetBtn.addEventListener("click", ()=> buildDeck(true));

(async function init(){
  await loadPacks();
  active = new Set(PACKS.map(p=>p.id));
  renderSelector();
  buildDeck(true);
})();
</script>
</body>
</html>
